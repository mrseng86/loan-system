services:
  postgres:
    image: postgres:16
    container_name: lms-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: loan_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d loan_management"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: lms-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/loan_management
      SECRET_KEY: change-this-secret-key
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      TESTING: "false"
      AUTO_CREATE_TABLES: "false"
      SEED_DEFAULT_ADMIN: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: ["sh", "/app/scripts/start.sh"]

  backend-test:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/loan_management
      SECRET_KEY: change-this-secret-key
      TESTING: "true"
      AUTO_CREATE_TABLES: "false"
      SEED_DEFAULT_ADMIN: "false"
    volumes:
      - ./backend:/app
    command: ["sh", "/app/scripts/test.sh"]
    profiles: ["test"]

volumes:
  postgres_data:
